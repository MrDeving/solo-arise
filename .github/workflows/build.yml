name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android Platform
        run: npx cap add android

      - name: Generate App Icons and Splash Screens
        run: npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Sync Version Number to Android
        run: |
          # 1. Read the version from package.json (e.g., "2.3")
          VERSION=$(node -p "require('./package.json').version")
          
          # 2. Read the GitHub Build Number (e.g., 45) for the internal version code
          BUILD_NUMBER=${{ github.run_number }}
          
          echo "Syncing Android app to Version: $VERSION (Build Code: $BUILD_NUMBER)"

          # 3. Use a robust 'sed' command that replaces ANY existing version string
          # This matches versionName followed by any quote type
          sed -i "s/versionName .*/versionName \"$VERSION\"/" android/app/build.gradle
          
          # 4. Update the versionCode (Crucial for Play Store updates)
          sed -i "s/versionCode .*/versionCode $BUILD_NUMBER/" android/app/build.gradle


      - name: Inject Exact Alarm Permissions
        run: |
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM" />' android/app/src/main/AndroidManifest.xml

      - name: Build and Sign Release APK
        run: |
          # 1. Generate the key (Same as before)
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias my-alias -storepass finalpassword123 -keypass finalpassword123 \
            -dname "CN=AriseSolo, OU=Dev, O=MyOrg, L=MyCity, S=MyState, C=US"

          # 2. Run the build through Gradle directly (more reliable for signing)
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.jks \
            -Pandroid.injected.signing.store.password=finalpassword123 \
            -Pandroid.injected.signing.key.alias=my-alias \
            -Pandroid.injected.signing.key.password=finalpassword123

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arisesolo-APK-Signed
          # Point to the specific release APK that Gradle generates
          path: android/app/build/outputs/apk/release/app-release.apk
