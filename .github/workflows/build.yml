name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # --- START OF TEMPORARY STEP ---
      # Run this ONCE to get your permanent key. 
      # Then copy the output from the GitHub Actions log.
      - name: GENERATE PERMANENT KEY (RUN ONCE)
        run: |
          keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias my-alias -storepass mypassword123 -keypass mypassword123 \
            -dname "CN=AriseSolo, OU=Dev, O=MyOrg, L=MyCity, S=MyState, C=US"
          echo "--- COPY EVERYTHING BELOW THIS LINE ---"
          base64 my-release-key.jks
          echo "--- COPY EVERYTHING ABOVE THIS LINE ---"
      # --- END OF TEMPORARY STEP ---

      - name: Add Android Platform
        run: npx cap add android

      - name: Generate App Icons and Splash Screens
        run: npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Sync Version Number to Android
        run: |
          VERSION=$(node -p "require('./package.json').version")
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" android/app/build.gradle
          sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" android/app/build.gradle

      - name: Inject Exact Alarm Permissions
        run: |
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arisesolo-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
