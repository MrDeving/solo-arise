name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android Platform
        run: npx cap add android

      - name: Generate App Icons and Splash Screens
        run: npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Sync Version Number to Android
        run: |
          VERSION=$(node -p "require('./package.json').version")
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" android/app/build.gradle
          sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" android/app/build.gradle

      - name: Inject Exact Alarm Permissions
        run: |
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM" />' android/app/src/main/AndroidManifest.xml

      - name: Build and Sign Release APK
        run: |
          # 1. Generate a BRAND NEW key right here so we KNOW the password is correct
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias my-alias -storepass finalpassword123 -keypass finalpassword123 \
            -dname "CN=AriseSolo, OU=Dev, O=MyOrg, L=MyCity, S=MyState, C=US"

          # 2. Build using that exact same password
          npx cap build android \
            --keystorepath $(pwd)/release.jks \
            --keystorepass "finalpassword123" \
            --keystorealias "my-alias" \
            --keystorealiaspass "finalpassword123" \
            --androidreleasetype APK

          # 3. Print the Base64 of this NEW key so you can save it to Secrets LATER
          echo "--- SAVE THIS NEW KEY TO YOUR ANDROID_KEYSTORE SECRET LATER ---"
          base64 release.jks


      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arisesolo-APK-Signed
          # Using the wildcard *.apk ensures it finds the file even if the name varies
          path: android/app/build/outputs/apk/release/*.apk

