name: Build Android APK

on: 
  push: 
    branches: [ main ] 
  workflow_dispatch:

jobs: 
  build: 
    runs-on: ubuntu-latest 
    
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4 
        
      - name: Setup Node.js 
        uses: actions/setup-node@v4 
        with: 
          node-version: '22' 
          
      - name: Install Dependencies 
        run: | 
          npm install 
          # Note: If the build fails on GitHub, you might need 'npm ci' instead 
          
      - name: Setup Java 
        uses: actions/setup-java@v4 
        with: 
          distribution: 'zulu' 
          java-version: '21' # Updated for Capacitor 8 compatibility 
          
      - name: Setup Android SDK 
        uses: android-actions/setup-android@v3 
        
      - name: Add Android Platform 
        run: npx cap add android 
        
      - name: Generate App Icons and Splash Screens 
        run: npx @capacitor/assets generate --android 
        
      - name: Sync Capacitor 
        run: npx cap sync android 
        
      - name: Sync Version Number to Android 
        run: | 
          # Grabs the version number (e.g., "1.2") directly from your package.json 
          VERSION=$(node -p "require('./package.json').version") 
          echo "Setting Android version to $VERSION and build number to ${{ github.run_number }}" 
          
          # Magically injects it into Android's native build file without Android Studio! 
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" android/app/build.gradle 
          sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" android/app/build.gradle 
          
      - name: Inject Exact Alarm Permissions 
        run: | 
          # Magically injects the notification bypass permissions into the AndroidManifest before building! 
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM" />' android/app/src/main/AndroidManifest.xml 
          
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.jks

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleRelease
          -Pandroid.injected.signing.store.file=app/my-release-key.jks
          -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }}
          -Pandroid.injected.signing.key.alias=my-key-alias
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        
      - name: Upload APK Artifact 
        uses: actions/upload-artifact@v4 
        with: 
          name: Arisesolo-APK 
          path: android/app/build/outputs/apk/release/app-release.apk
