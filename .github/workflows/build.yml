name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android Platform
        run: npx cap add android

      - name: Generate App Icons and Splash Screens
        run: npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Sync Version Number to Android
        run: |
          VERSION=$(node -p "require('./package.json').version")
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" android/app/build.gradle
          sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" android/app/build.gradle

      - name: Inject Exact Alarm Permissions
        run: |
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM" />' android/app/src/main/AndroidManifest.xml

      # --- SIGNING STEP ---
      - name: Build and Sign Release APK
        run: |
          # 1. Decode the keystore
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > release.jks
          
          # 2. Build and sign using Capacitor CLI
          # Removed the '--bundle' flag that was causing the error
          npx cap build android \
            --keystorepath $(pwd)/release.jks \
            --keystorepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            --keystorealias "my-alias" \
            --keystorealiaspass "${{ secrets.KEY_PASSWORD }}" \
            --androidreleasetype APK




      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arisesolo-APK-Signed
          path: android/app/build/outputs/apk/release/app-release.apk

